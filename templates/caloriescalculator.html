{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh; padding: 20px;">

    <form action="{{ url_for('profile') }}" method="POST" class="calculator-card shadow p-4 rounded bg-white"
        style="max-width: 450px; width: 100%;">
        <h3 class="text-center mb-4">Calorie Calculator</h3>

        <div class="mb-3">
            <label for="weight" class="form-label">Weight (kg)</label>
            <input type="number" step="0.1" name="weight" id="weight" class="form-control" placeholder="Weight kg"
                required />
        </div>

        <div class="mb-3">
            <label for="height" class="form-label">Height (cm)</label>
            <input type="number" step="0.1" name="height" id="height" class="form-control" placeholder="Height in cm"
                required />
        </div>

        <div class="mb-3">
            <label for="age" class="form-label">Age (years)</label>
            <input type="number" name="age" id="age" class="form-control" placeholder="Age" required />
        </div>

        <div class="mb-3">
            <label class="form-label d-block text-center fw-bold">Dietary Preference</label>
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="dietary_preference" id="veg" value="Veg" autocomplete="off" checked>
                <label class="btn btn-outline-primary" for="veg">Veg</label>

                <input type="radio" class="btn-check" name="dietary_preference" id="non-veg" value="Non-Veg" autocomplete="off">
                <label class="btn btn-outline-primary" for="non-veg">Non-Veg</label>
            </div>
        </div>

                <div class="mb-3">
            <label class="form-label d-block text-center fw-bold">Goal</label>
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="goal" id="cutting" value="cutting" autocomplete="off" checked>
                <label class="btn btn-outline-primary" for="cutting">Cutting</label>

                <input type="radio" class="btn-check" name="goal" id="maintenance" value="maintenance" autocomplete="off">
                <label class="btn btn-outline-primary" for="maintenance">Maintenance</label>

                <input type="radio" class="btn-check" name="goal" id="bulking" value="bulking" autocomplete="off">
                <label class="btn btn-outline-primary" for="bulking">Bulking</label>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label d-block text-center fw-bold">Gender</label>
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="gender" id="male" value="male" autocomplete="off" checked>
                <label class="btn btn-outline-primary" for="male">Male</label>

                <input type="radio" class="btn-check" name="gender" id="female" value="female" autocomplete="off">
                <label class="btn btn-outline-primary" for="female">Female</label>
            </div>
        </div>

        <div class="mb-4">
            <label for="activity-level" class="form-label fw-bold">Activity Level</label>
            <select name="activity_level" id="activity-level" class="form-select">
                <option value="1.2">Sedentary (little or no exercise)</option>
                <option value="1.375">Lightly active (1-3 days/week)</option>
                <option value="1.55">Moderately active (3-5 days/week)</option>
                <option value="1.725">Very active (6-7 days/week)</option>
                <option value="1.9">Extremely active (physical job)</option>
            </select>
        </div>

        <div class="d-grid gap-2">
            <button type="button" class="btn btn-info text-white" onclick="calculateCalories()">Calculate
                Calories</button>

            <div id="result" class="text-center fw-bold text-success my-2" style="min-height: 24px;"></div>
            <input type="hidden" name="calories" id="caloriesInput">

            <button type="submit" class="btn btn-primary btn-lg">Save & Submit to Profile</button>
        </div>
    </form>
</div>
<script>
    function calculateCalories() {

        const weight = parseFloat(document.getElementById('weight').value);
        const height = parseFloat(document.getElementById('height').value);
        const age = parseFloat(document.getElementById('age').value);
        const gender = document.querySelector('input[name="gender"]:checked').value;
        const activityLevel = parseFloat(document.getElementById('activity-level').value);

        if (!weight || !height || !age) {
            alert("Please fill all details");
            return;
        }

        // Mifflin-St Jeor Equation
        let bmr;

        if (gender === 'male') {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
        } else {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
        }

        const totalCalories = bmr * activityLevel;
        const roundedCalories = Math.round(totalCalories);

        // Show result
        document.getElementById('result').textContent =
            `Estimated Needs: ${roundedCalories} kcal/day`;

        // Set hidden input value (IMPORTANT)
        document.getElementById('caloriesInput').value = roundedCalories;
    }
</script>

<style>
   /* Page background (light gym style pattern) */
body{
    background-color:#f3f6f9 !important;
    background-image:
        linear-gradient(45deg, rgba(0,0,0,0.04) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(0,0,0,0.04) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(0,0,0,0.04) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(0,0,0,0.04) 75%);
    background-size:60px 60px;
    background-position:0 0,0 30px,30px -30px,-30px 0px;
}

/* Calculator card simple */
.calculator-card{
    background:white !important;
    border-radius:10px !important;
    border:1px solid #e2e2e2 !important;
    box-shadow:0 6px 15px rgba(0,0,0,0.08) !important;
}

/* Title */
.calculator-card h3{
    font-weight:600;
    color:#2c3e50;
}

/* Inputs */
.form-control,
.form-select{
    border-radius:6px !important;
}

/* Buttons simple */
.btn{
    border-radius:6px !important;
}
</style>
{% endblock %}
