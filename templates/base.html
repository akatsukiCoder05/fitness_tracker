<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Arambh Fitness{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- <link rel="stylesheet" href="../static/css/calories cal.css"> -->
  <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/calories cal.css') }}">  -->
  <!-- <link rel="stylesheet" href="../static/css/calorie_goal.css"> -->
  <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/calorie_goal.css') }}"> -->
  <!-- <link rel="stylesheet" href="../static/css/tip_for_success.css"> -->
  <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/tip_for_success.css') }}"> -->

  <!-- Common Styles -->
  <style>
    :root {
      --sidebar-width: 250px;
      --bg: #f6f8fb;
      --card: #ffffff;
      --accent: #000000;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

.sidebar {
        width: var(--sidebar-width);
        height: 100vh;
        background: #0b1220;
        position: fixed; /* Sidebar flow se bahar hai */
        top: 0;
        left: 0;
        z-index: 1000;
        overflow-y: auto;
    }

    /* Sabse important part: Main content ko dhakka dena */
    .main-content {
        margin-left: var(--sidebar-width); /* Ye overlap khatam karega */
        min-height: 100vh;
        width: calc(100% - var(--sidebar-width));
        transition: all 0.3s ease;
    }

    /* Navbar ko sidebar se upar dikhane ke liye index badhayein */
    .navbar {
      z-index: 1050;
      position: sticky;
      top: 0;
    }


    .sidebar a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      display: block;
      padding: 0.75rem 1rem;
    }

    .sidebar a:hover,
    .sidebar .active {
      background: rgba(255, 255, 255, 0.06);
    }

    .card {
      border: none;
      background: var(--card);
      box-shadow: 0 1px 3px rgba(15, 15, 15, 0.06);
    }

    .metric {
      font-weight: 700;
      font-size: 1.4rem;
    }

    .metric-small {
      color: #6b7280;
      font-size: 0.9rem;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
    }

    .chart-card {
      min-height: 260px;
    }

    .table-sm td,
    .table-sm th {
      padding: 0.45rem 0.5rem;
    }

    @media (max-width: 991px) {
      .sidebar {
        transform: translateX(-100%);
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
      }

      .sidebar.show {
        transform: translateX(0);
      }

      .main-content {
        margin-left: 0;
        width: 100%;
      }
    }

    @media (min-width: 992px) {
      .main-content {
        margin-left: 250px;
        /* Ye sidebar ki width jitna gap banayega */
      }
    }

    /* ai chat bot css */

    /* Floating Button */
#aiFloatingBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    background: #f0eeee;
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    z-index: 9999;
    transition: 0.3s;
}

#aiFloatingBtn:hover {
    transform: scale(1.1);
}

/* Chat Box */
#aiChatBox {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 320px;
    height: 450px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
}

/* Header */
.chat-header {
    background: #111;
    color: white;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Body */
.chat-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    background: #f7f7f7;
}

/* Footer */
.chat-footer {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
}

.chat-footer input {
    flex: 1;
    padding: 8px;
}

.chat-footer button {
    background: #111;
    color: white;
    border: none;
    padding: 8px 12px;
}

/* Messages */
.ai-msg {
    background: #eaeaea;
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 8px;
}

.user-msg {
    background: #111;
    color: white;
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 8px;
    text-align: right;
}
 </style>

  {% block extra_css %}{% endblock %}
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-info">
    <div class="container-fluid">
      <button class="btn btn-primary d-lg-none me-2" type="button" onclick="toggleSidebar()">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a class="navbar-brand" href="/dashboard">Home</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav"
        aria-controls="topNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="topNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link text-light" href="/info">Profile</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-light" href="/logout">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <aside class="sidebar d-block" id="sidebar">
    <div class="px-2">
      <a class="mb-3 d-block fs-5 fw-semibold text-white">Dashboard</a>
      <a class="{% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">Overview</a>
      <a href="/workouts">Workouts</a>
      <a href="/caloriegoal">Nutrition</a>
      <a href="/caloriescalculator" class="{% if request.path == '/caloriescalculator' %}active{% endif %}">Calories
        Calculator</a>
      <a href="/ai-coach">AI Coach</a>
    </div>
  </aside>

  <!-- ai bot -->
   <!-- Floating AI Button -->
<div id="aiFloatingBtn" onclick="toggleChat()">
   <a href="{{ url_for('ai_coach') }}" style="text-decoration: none;"> 🤖</a>
</div>



  <div class="main-content">
    {% block content %}{% endblock %}
  </div>


  <!-- Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>

  {% block extra_js %}{% endblock %}
</body>

</html>
